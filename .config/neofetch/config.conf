print_info() {
    prin "${cl5}simidzu@simidzu2ay"
    prin "${cl9}┌──────────────────────────────────────┐"

    info "\n \n " distro
    info "\n \n " model
    info "\n \n " kernel
    info "\n \n " cpu
    info "\n \n " gpu
    info "\n \n " memory
    info "\n \n " disk
    info "\n \n " packages
    info "\n \n " shell
    info "\n \n " local_ip
    info "\n \n " de
    info "\n \n " wm
    info "\n \n " term
    info "\n \n " font
    info "\n \n " term_font

    info "\n \n " song
    [[ "$player" ]] && prin "\n \n " "$player"

    info "\n \n " uptime
    prin "${cl9}└───────────────────── ${cl0} ${cl1} ${cl2} ${cl3} ${cl4} ${cl5} ${cl6} $(color 15) ${cl9}┘"
    prin "\n"
}

reset="\033[0m"
gray="\033[1;90m"
red="\033[1;31m"
green="\033[1;32m"
yellow="\033[1;33m"
blue="\033[1;34m"
magenta="\033[1;35m"
cyan="\033[1;36m"
white="\033[1;37m"

cl0="${gray}"
cl1="${red}"
cl2="${green}"
cl3="${yellow}"
cl4="${blue}"
cl5="${magenta}"
cl6="${cyan}"
cl7="${white}"
cl9="${reset}"

title_fqdn="off"
kernel_shorthand="on"
distro_shorthand="off"
os_arch="off"
uptime_shorthand="on"
memory_percent="on"

package_managers="on"
shell_path="off"
shell_version="on"

speed_type="scaling_max_freq"
speed_shorthand="on"
cpu_brand="on"
cpu_speed="on"
cpu_cores="logical"
cpu_temp="off"

gpu_brand="on"
gpu_type="all"

refresh_rate="on"

gtk_shorthand="on"
gtk2="on"
gtk3="on"

public_ip_host="http://kattunge.local"
public_ip_timeout=2

de_version="on"

disk_show=('/' '/home')
disk_subtitle="dir"
disk_percent="on"

music_player="auto"
song_format="%title% - %artist% - %album%"
song_shorthand="off"

mpc_args=()


colors=(7 7 7 7 7 7)
bold="on"
underline_enabled="on"
underline_char="-"
separator=" "

block_range=(0 15)
color_blocks="on"
block_width=3
block_height=1

col_offset="auto"

bar_char_elapsed="-"
bar_char_total="="
bar_border="on"
bar_length=15
bar_color_elapsed="distro"
